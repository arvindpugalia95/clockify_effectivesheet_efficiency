<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Efficiency Report</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#111318;--s1:#181b22;--s2:#1f232c;--s3:#272c38;
  --brd:#2b303d;--bl:#353b4a;
  --tx:#e2e4ea;--dim:#8a8fa0;--mut:#555a6d;
  --acc:#4a90d9;--acc2:rgba(74,144,217,.12);
  --g1:#0f9d58;--g2:#34a853;--g3:#7cb342;--g4:#c0ca33;
  --y1:#f9a825;--y2:#f57f17;
  --r1:#e53935;--r2:#c62828;--r3:#b71c1c;
  --fn:'IBM Plex Sans',system-ui,sans-serif;
  --mo:'IBM Plex Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--fn);background:var(--bg);color:var(--tx);min-height:100vh;}

/* ── Setup ── */
.setup{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
.setup.off{display:none;}
.sbox{background:var(--s1);border:1px solid var(--brd);border-radius:14px;padding:32px;width:480px;max-width:100%;}
.sbox h2{font-size:20px;font-weight:700;margin-bottom:3px;}
.sbox .sub{color:var(--dim);font-size:13px;margin-bottom:22px;}
.fg{margin-bottom:14px;}
.fg label{display:block;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--mut);margin-bottom:4px;}
.fg input,.fg select{width:100%;padding:9px 11px;background:var(--s2);border:1px solid var(--brd);border-radius:7px;color:var(--tx);font-family:var(--mo);font-size:12px;outline:none;}
.fg input:focus{border-color:var(--acc);}
.fg .hn{font-size:10px;color:var(--mut);margin-top:3px;}
.rw{display:flex;gap:10px;}.rw .fg{flex:1;}
.btn{width:100%;padding:11px;margin-top:6px;background:var(--acc);border:none;border-radius:9px;color:#fff;font-family:var(--fn);font-size:14px;font-weight:600;cursor:pointer;}
.btn:hover{opacity:.9;}.btn:disabled{opacity:.3;cursor:not-allowed;}
.err{background:rgba(229,57,53,.1);border:1px solid rgba(229,57,53,.25);border-radius:7px;padding:9px 12px;color:var(--r1);font-size:12px;margin-top:10px;display:none;word-break:break-word;}
.err.on{display:block;}

/* ── Load ── */
.ld{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:90vh;gap:16px;}
.ld.off{display:none;}
.sp{width:40px;height:40px;border:3px solid var(--brd);border-top-color:var(--acc);border-radius:50%;animation:rot .7s linear infinite;}
@keyframes rot{to{transform:rotate(360deg);}}
.lm{font-size:14px;color:var(--dim);}.ls{font-size:11px;color:var(--mut);font-family:var(--mo);}

/* ── Dashboard ── */
.dash{max-width:1300px;margin:0 auto;padding:24px 16px;}
.dash.off{display:none;}

/* Top bar mimicking the sheet header */
.toprow{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:18px;}
.toprow h1{font-size:22px;font-weight:700;letter-spacing:-.3px;}
.toprow .meta{font-size:11px;color:var(--mut);font-family:var(--mo);}
.toprow .acts{display:flex;gap:8px;align-items:center;}
.sm{padding:6px 13px;background:var(--s2);border:1px solid var(--brd);border-radius:7px;color:var(--dim);font-family:var(--fn);font-size:12px;cursor:pointer;transition:all .15s;}
.sm:hover{border-color:var(--acc);color:var(--tx);}
.sm select{background:transparent;border:none;color:var(--dim);font-family:var(--fn);font-size:12px;cursor:pointer;outline:none;}
.sm select option{background:var(--s2);color:var(--tx);}

/* ── Sheet-like controls row ── */
.ctrl{display:flex;gap:16px;align-items:center;padding:12px 16px;background:var(--s1);border:1px solid var(--brd);border-radius:10px;margin-bottom:16px;flex-wrap:wrap;}
.ctrl .lbl{font-size:11px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.6px;margin-right:4px;}
.ctrl .val{font-family:var(--mo);font-size:13px;font-weight:600;color:var(--acc);}

/* ── Summary cards (APSS Level / Client Level) ── */
.sumrow{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px;}
.sumcard{background:var(--s1);border:1px solid var(--brd);border-radius:10px;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;}
.sumcard .slbl{font-size:12px;font-weight:600;color:var(--dim);}
.sumcard .svals{display:flex;gap:20px;align-items:center;}
.sumcard .sv{text-align:right;}
.sumcard .sv .svl{font-size:9px;text-transform:uppercase;letter-spacing:.6px;color:var(--mut);}
.sumcard .sv .svv{font-family:var(--mo);font-size:18px;font-weight:700;}

/* ── Tabs ── */
.tabs{display:flex;gap:0;margin-bottom:16px;border-bottom:1px solid var(--brd);}
.tb{padding:9px 16px;background:none;border:none;border-bottom:2px solid transparent;color:var(--mut);font-family:var(--fn);font-size:13px;font-weight:500;cursor:pointer;}
.tb:hover{color:var(--dim);}.tb.on{color:var(--acc);border-bottom-color:var(--acc);}

/* ── Table ── */
.card{background:var(--s1);border:1px solid var(--brd);border-radius:10px;overflow:hidden;margin-bottom:16px;}
.tw{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead th{
  background:var(--s2);padding:9px 14px;text-align:left;
  font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;
  color:var(--mut);border-bottom:1px solid var(--brd);white-space:nowrap;
}
th.r,td.r{text-align:right;}
th.c,td.c{text-align:center;}
td{padding:9px 14px;border-bottom:1px solid var(--brd);white-space:nowrap;}
tr:last-child td{border-bottom:none;}
tbody tr:hover{background:rgba(74,144,217,.03);}
td.m{font-family:var(--mo);font-size:12px;}
.cn{font-weight:600;}

/* Expandable */
.exp{cursor:pointer;transition:background .15s;}
.exp:hover{background:var(--s2);}
.exp td:first-child::before{content:'▸';display:inline-block;width:14px;color:var(--mut);font-size:11px;transition:transform .15s;}
.exp.open td:first-child::before{transform:rotate(90deg);}
.sr{display:none;}.sr.show{display:table-row;}
.sr td{padding-left:32px;background:var(--s2);font-size:12px;}

/* Total row */
tr.tot{background:var(--s2);font-weight:700;}
tr.tot td{border-top:2px solid var(--brd);}

/* Efficiency cell — colored */
.efc{
  font-family:var(--mo);font-size:13px;font-weight:700;
  padding:4px 10px;border-radius:4px;display:inline-block;
  min-width:60px;text-align:center;
}

/* User cards */
.ug{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:12px;}
.uc{background:var(--s1);border:1px solid var(--brd);border-radius:10px;overflow:hidden;transition:border .15s;}
.uc:hover{border-color:var(--acc);}
.uc-top{padding:14px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--brd);}
.uc-top .nm{font-size:14px;font-weight:600;}
.uc-top .ef-badge{font-family:var(--mo);font-size:15px;font-weight:700;padding:3px 10px;border-radius:5px;}
.uc-stats{display:grid;grid-template-columns:1fr 1fr 1fr;padding:12px 16px;gap:8px;}
.uc-stats .us .usl{font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:var(--mut);}
.uc-stats .us .usv{font-family:var(--mo);font-size:16px;font-weight:600;margin-top:2px;}
.uc-clients{max-height:0;overflow:hidden;transition:max-height .3s ease;}
.uc.open .uc-clients{max-height:600px;}
.uc-clients table{font-size:12px;}
.uc-clients th{font-size:9px;padding:6px 12px;}
.uc-clients td{padding:6px 12px;font-size:12px;}
.uc-toggle{padding:8px 16px;text-align:center;font-size:11px;color:var(--mut);cursor:pointer;border-top:1px solid var(--brd);}
.uc-toggle:hover{color:var(--acc);background:var(--s2);}

.pn{display:none;}.pn.on{display:block;}
.dim{color:var(--mut);font-style:italic;}

/* Search */
.si{padding:6px 10px;background:var(--s2);border:1px solid var(--brd);border-radius:6px;color:var(--tx);font-family:var(--fn);font-size:12px;outline:none;width:180px;}
.si:focus{border-color:var(--acc);}.si::placeholder{color:var(--mut);}

@media(max-width:640px){
  .sumrow{grid-template-columns:1fr;}.ug{grid-template-columns:1fr;}
  .ctrl{flex-direction:column;gap:8px;}
}
</style>
</head>
<body>

<!-- ═══ SETUP ═══ -->
<div class="setup" id="setup">
  <div class="sbox">
    <h2>⚡ Efficiency Report</h2>
    <p class="sub">Billable (Sheet Col H) ÷ Clockify Tracked = Efficiency %</p>
    <div class="fg">
      <label>Apps Script Web App URL</label>
      <input type="text" id="apiUrl" placeholder="https://script.google.com/macros/s/AKfyc.../exec">
      <div class="hn">Deploy Code.gs → New Deployment → Web App → Copy URL</div>
    </div>
    <div class="rw">
      <div class="fg"><label>Start Date</label><input type="date" id="sd"></div>
      <div class="fg"><label>End Date</label><input type="date" id="ed"></div>
    </div>
    <div class="err" id="err"></div>
    <button class="btn" id="go" onclick="run()">Generate Report</button>
  </div>
</div>

<!-- ═══ LOADING ═══ -->
<div class="ld off" id="ld">
  <div class="sp"></div>
  <div class="lm" id="lm">Connecting...</div>
  <div class="ls" id="ls">Reading tabs + Clockify</div>
</div>

<!-- ═══ DASHBOARD ═══ -->
<div class="dash off" id="dash">

  <div class="toprow">
    <div>
      <h1>Efficiency Report</h1>
      <div class="meta" id="metaLabel"></div>
    </div>
    <div class="acts">
      <input class="si" placeholder="Search..." id="globalSearch" oninput="applySearch()">
      <button class="sm" onclick="exportCSV()">↓ CSV</button>
      <button class="sm" onclick="window.print()">⎙ Print</button>
      <button class="sm" onclick="location.reload()">↻ New</button>
    </div>
  </div>

  <!-- Controls row (like the sheet header) -->
  <div class="ctrl">
    <div><span class="lbl">Date</span> <span class="val" id="ctrlDate"></span></div>
    <div>
      <span class="lbl">Team</span>
      <select id="teamSel" onchange="changeTeam()" class="val" style="background:transparent;border:none;color:var(--acc);font-family:var(--mo);font-size:13px;font-weight:600;cursor:pointer;outline:none;">
        <option value="all">All</option>
      </select>
    </div>
    <div><span class="lbl">Tabs Read</span> <span class="val" id="ctrlTabs"></span></div>
    <div><span class="lbl">Entries</span> <span class="val" id="ctrlEntries"></span></div>
  </div>

  <!-- Summary row -->
  <div class="sumrow" id="sumArea"></div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tb on" onclick="showP('clients',this)">By Client</button>
    <button class="tb" onclick="showP('users',this)">By User</button>
  </div>

  <!-- CLIENT PANE -->
  <div class="pn on" id="p-clients">
    <div class="card">
      <div class="tw">
        <table>
          <thead><tr>
            <th style="width:30%;">Client</th>
            <th class="r">Clockify</th>
            <th class="r">Billable</th>
            <th class="c">Efficiency</th>
            <th>Top User</th>
          </tr></thead>
          <tbody id="cTbl"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- USER PANE -->
  <div class="pn" id="p-users">
    <div class="ug" id="uGrid"></div>
  </div>
</div>

<script>
let D=null, RAW=null;

(function(){
  const n=new Date(),d=n.getDay(),df=n.getDate()-d+(d===0?-6:1);
  const m=new Date(n);m.setDate(df);
  const s=new Date(m);s.setDate(m.getDate()+6);
  document.getElementById('sd').value=iso(m);
  document.getElementById('ed').value=iso(s);
  const sv=localStorage.getItem('effUrl');
  if(sv)document.getElementById('apiUrl').value=sv;
})();

function iso(d){return d.toISOString().slice(0,10);}
function fdt(s){return new Date(s+'T00:00:00').toLocaleDateString('en-US',{day:'numeric',month:'short',year:'numeric'});}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function css(s){return s.replace(/[^a-zA-Z0-9]/g,'_');}

// ── Efficiency color (green → red gradient) ──
function effColor(v){
  if(v>=80)return{bg:'rgba(15,157,88,.18)',fg:'#0f9d58'};
  if(v>=60)return{bg:'rgba(124,179,66,.15)',fg:'#7cb342'};
  if(v>=40)return{bg:'rgba(249,168,37,.14)',fg:'#f9a825'};
  if(v>=20)return{bg:'rgba(245,127,23,.14)',fg:'#f57f17'};
  if(v>0) return{bg:'rgba(229,57,53,.13)',fg:'#e53935'};
  return{bg:'rgba(183,28,28,.15)',fg:'#b71c1c'};
}

function effCell(v){
  const c=effColor(v);
  const label=v>200?'∞':v.toFixed(2)+'%';
  return `<span class="efc" style="background:${c.bg};color:${c.fg};">${label}</span>`;
}

// ════════════════════════
// RUN
// ════════════════════════
async function run(){
  const url=document.getElementById('apiUrl').value.trim();
  const s=document.getElementById('sd').value;
  const e=document.getElementById('ed').value;
  if(!url){sErr('Enter your Apps Script URL.');return;}
  if(!s||!e){sErr('Select both dates.');return;}
  localStorage.setItem('effUrl',url);
  hErr();
  document.getElementById('go').disabled=true;
  show('ld');
  sLd('Fetching report...','Reading all client tabs + Clockify');
  try{
    const r=await fetch(`${url}?action=report&start=${s}&end=${e}`);
    if(!r.ok)throw new Error('HTTP '+r.status);
    const j=await r.json();
    if(!j.success)throw new Error(j.error);
    RAW=j.data; D=j.data;
    show('dash');
    populateTeamFilter();
    render();
  }catch(err){
    console.error(err);
    show('setup');
    document.getElementById('go').disabled=false;
    sErr('Failed: '+err.message+'. Ensure Apps Script deployed with access "Anyone".');
  }
}

function show(id){
  ['setup','ld','dash'].forEach(function(x){document.getElementById(x).classList.toggle('off',x!==id);});
}
function sErr(m){const b=document.getElementById('err');b.textContent=m;b.classList.add('on');}
function hErr(){document.getElementById('err').classList.remove('on');}
function sLd(m,s){document.getElementById('lm').textContent=m;document.getElementById('ls').textContent=s;}

// ════════════════════════
// TEAM FILTER
// ════════════════════════
function populateTeamFilter(){
  const sel=document.getElementById('teamSel');
  sel.innerHTML='<option value="all">All</option>';
  if(D.allUserNames){
    D.allUserNames.sort().forEach(function(u){
      sel.innerHTML+='<option value="'+esc(u)+'">'+esc(u)+'</option>';
    });
  }
}

async function changeTeam(){
  const url=localStorage.getItem('effUrl');
  const s=document.getElementById('sd').value;
  const e=document.getElementById('ed').value;
  const team=document.getElementById('teamSel').value;

  // If "all", use cached RAW data
  if(team==='all'){
    D=RAW;
    render();
    return;
  }

  // Re-fetch with team filter
  show('ld');
  sLd('Filtering for '+team+'...','');
  try{
    const r=await fetch(`${url}?action=report&start=${s}&end=${e}&team=${encodeURIComponent(team)}`);
    const j=await r.json();
    if(!j.success)throw new Error(j.error);
    D=j.data;
    show('dash');
    render();
  }catch(err){
    show('dash');
    alert('Filter failed: '+err.message);
    document.getElementById('teamSel').value='all';
    D=RAW;
    render();
  }
}

// ════════════════════════
// RENDER
// ════════════════════════
function render(){
  const t=D.totals;
  const s=document.getElementById('sd').value;
  const e=document.getElementById('ed').value;
  document.getElementById('metaLabel').textContent=fdt(s)+' → '+fdt(e);
  document.getElementById('ctrlDate').textContent=fdt(s)+' — '+fdt(e);
  document.getElementById('ctrlTabs').textContent=D.meta.sheetTabsRead;
  document.getElementById('ctrlEntries').textContent=D.meta.clockifyEntries;

  // Summary cards
  var clientBill=0,clientClock=0;
  D.clients.forEach(function(c){clientClock+=c.clockify;clientBill+=c.billable;});
  var clientEff=clientClock>0?(clientBill/clientClock*100):0;

  var ac=effColor(t.apssEfficiency);
  var cc=effColor(clientEff);

  document.getElementById('sumArea').innerHTML=`
    <div class="sumcard">
      <div class="slbl">APSS Level</div>
      <div class="svals">
        <div class="sv"><div class="svl">Clockify</div><div class="svv">${t.apssClockify.toFixed(2)}</div></div>
        <div class="sv"><div class="svl">Billable</div><div class="svv">${t.apssBillable.toFixed(2)}</div></div>
        <div class="sv"><div class="svl">Efficiency</div><div class="svv" style="color:${ac.fg}">${t.apssEfficiency.toFixed(2)}%</div></div>
      </div>
    </div>
    <div class="sumcard">
      <div class="slbl">Client Level</div>
      <div class="svals">
        <div class="sv"><div class="svl">Clockify</div><div class="svv">${clientClock.toFixed(2)}</div></div>
        <div class="sv"><div class="svl">Billable</div><div class="svv">${clientBill.toFixed(2)}</div></div>
        <div class="sv"><div class="svl">Efficiency</div><div class="svv" style="color:${cc.fg}">${clientEff.toFixed(2)}%</div></div>
      </div>
    </div>`;

  renderClients();
  renderUsers();
}

// ── CLIENT TABLE ──
function renderClients(){
  const search=(document.getElementById('globalSearch').value||'').toLowerCase();
  let h='';
  let totC=0,totB=0;

  for(const c of D.clients){
    if(search&&!c.clientName.toLowerCase().includes(search))continue;
    const id='s-'+css(c.clientName);
    const topUser=c.users.length>0?c.users[0].userName:'—';

    totC+=c.clockify;totB+=c.billable;

    h+=`<tr class="exp" onclick="tog(this,'${id}')">
      <td class="cn">${esc(c.clientName)}</td>
      <td class="r m">${c.clockify.toFixed(2)}</td>
      <td class="r m" style="font-style:italic;">${c.billable.toFixed(2)}</td>
      <td class="c">${effCell(c.efficiency)}</td>
      <td class="m" style="color:var(--dim);font-size:11px;">${esc(topUser)}</td>
    </tr>`;

    for(const u of c.users){
      h+=`<tr class="sr" data-p="${id}">
        <td style="padding-left:32px;color:var(--dim);">↳ ${esc(u.userName)}</td>
        <td class="r m">${u.clockify.toFixed(2)}</td>
        <td class="r m" style="font-style:italic;">${u.billable.toFixed(2)}</td>
        <td class="c">${effCell(u.efficiency)}</td>
        <td></td>
      </tr>`;
    }
  }

  // Total
  const totEff=totC>0?(totB/totC*100):0;
  h+=`<tr class="tot">
    <td>TOTAL</td>
    <td class="r m">${totC.toFixed(2)}</td>
    <td class="r m" style="font-style:italic;">${totB.toFixed(2)}</td>
    <td class="c">${effCell(totEff)}</td>
    <td></td>
  </tr>`;

  document.getElementById('cTbl').innerHTML=h;
}

// ── USER CARDS ──
function renderUsers(){
  const search=(document.getElementById('globalSearch').value||'').toLowerCase();
  let h='';

  for(const u of D.users){
    if(search&&!u.userName.toLowerCase().includes(search))continue;
    const ec=effColor(u.efficiency);
    const id='uc-'+css(u.userName);

    let ctbl='<table><thead><tr><th>Client</th><th class="r">Clockify</th><th class="r">Billable</th><th class="c">Eff</th></tr></thead><tbody>';
    for(const c of u.clients){
      ctbl+=`<tr>
        <td>${esc(c.clientName)}</td>
        <td class="r m">${c.clockify.toFixed(2)}</td>
        <td class="r m">${c.billable.toFixed(2)}</td>
        <td class="c">${effCell(c.efficiency)}</td>
      </tr>`;
    }
    ctbl+='</tbody></table>';

    h+=`<div class="uc" id="${id}">
      <div class="uc-top">
        <div class="nm">${esc(u.userName)}</div>
        <span class="ef-badge" style="background:${ec.bg};color:${ec.fg};">${u.efficiency>200?'∞':u.efficiency.toFixed(1)}%</span>
      </div>
      <div class="uc-stats">
        <div class="us"><div class="usl">Clockify</div><div class="usv" style="color:var(--acc);">${u.totalClockify.toFixed(1)}</div></div>
        <div class="us"><div class="usl">Billable</div><div class="usv" style="color:#7cb342;">${u.totalBillable.toFixed(1)}</div></div>
        <div class="us"><div class="usl">Clients</div><div class="usv">${u.clientCount}</div></div>
      </div>
      <div class="uc-clients">${ctbl}</div>
      <div class="uc-toggle" onclick="togUC('${id}')">▾ Show client breakdown</div>
    </div>`;
  }

  if(!h)h='<p style="color:var(--mut);padding:20px;">No users found.</p>';
  document.getElementById('uGrid').innerHTML=h;
}

// ════════════════════════
// HELPERS
// ════════════════════════
function tog(row,id){
  row.classList.toggle('open');
  document.querySelectorAll('tr[data-p="'+id+'"]').forEach(function(r){r.classList.toggle('show');});
}

function togUC(id){
  const el=document.getElementById(id);
  el.classList.toggle('open');
  const btn=el.querySelector('.uc-toggle');
  btn.textContent=el.classList.contains('open')?'▴ Hide client breakdown':'▾ Show client breakdown';
}

function showP(name,btn){
  document.querySelectorAll('.pn').forEach(function(p){p.classList.remove('on');});
  document.querySelectorAll('.tb').forEach(function(t){t.classList.remove('on');});
  document.getElementById('p-'+name).classList.add('on');
  btn.classList.add('on');
}

function applySearch(){renderClients();renderUsers();}

function exportCSV(){
  let csv='Client,User,Clockify Hours,Billable Hours,Efficiency %\n';
  for(const c of D.clients){
    csv+='"'+c.clientName+'",,'+c.clockify.toFixed(2)+','+c.billable.toFixed(2)+','+c.efficiency.toFixed(2)+'\n';
    for(const u of c.users)
      csv+='"'+c.clientName+'","'+u.userName+'",'+u.clockify.toFixed(2)+','+u.billable.toFixed(2)+','+u.efficiency.toFixed(2)+'\n';
  }
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download='efficiency-report.csv';a.click();
}
</script>
